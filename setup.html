<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Fit Character - 캐릭터 만들기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    font-family: 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #ecf0f1;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .titlebar {
    height: 32px;
    background: #16213e;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-app-region: drag;
    font-size: 12px;
    opacity: 0.6;
  }

  .content {
    padding: 20px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    height: calc(100% - 32px);
  }

  h1 { font-size: 1.3rem; font-weight: 700; }
  .subtitle { font-size: 0.8rem; opacity: 0.5; margin-top: -8px; }

  .editor {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    width: 100%;
  }

  /* 미리보기 */
  .preview { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .preview-box {
    width: 140px; height: 180px;
    background: #27ae60; border-radius: 12px;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 10px; image-rendering: pixelated;
    position: relative; overflow: hidden;
  }
  .preview-ground {
    position: absolute; bottom: 0; left: 0; right: 0; height: 10px; background: #1e8449;
  }
  #previewCanvas { image-rendering: pixelated; z-index: 1; }
  .preview-name { font-size: 12px; background: rgba(0,0,0,0.4); padding: 2px 10px; border-radius: 8px; }

  /* 설정 */
  .settings { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .field-group { display: flex; flex-direction: column; gap: 3px; }
  .field-group label { font-size: 11px; font-weight: 600; opacity: 0.7; }
  .nickname-input {
    background: #16213e; border: 2px solid #0f3460; border-radius: 8px;
    padding: 7px 12px; color: #ecf0f1; font-size: 13px; outline: none; width: 100%;
  }
  .nickname-input:focus { border-color: #3498db; }
  .nickname-input::placeholder { color: #555; }
  .error-msg { font-size: 11px; color: #e74c3c; height: 14px; }

  /* 성별 선택 */
  .gender-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; max-height: 260px; overflow-y: auto; padding-right: 4px; }
  .gender-selector::-webkit-scrollbar { width: 8px; }
  .gender-selector::-webkit-scrollbar-track { background: #0f1520; border-radius: 4px; }
  .gender-selector::-webkit-scrollbar-thumb { background: #3e4a6e; border-radius: 4px; }
  .gender-selector::-webkit-scrollbar-thumb:hover { background: #5a6a9e; }
  .gender-btn {
    padding: 8px 4px; border: 2px solid #333; border-radius: 8px;
    background: #16213e; color: #aaa; font-size: 11px; cursor: pointer;
    text-align: center; transition: all 0.2s; white-space: nowrap;
  }
  .gender-btn:hover { border-color: #3498db; color: #ecf0f1; }
  .gender-btn.active { border-color: #3498db; background: #1a3a6e; color: white; }

  /* 색상 */
  .color-rows { display: flex; flex-direction: column; gap: 6px; }
  .color-row { display: flex; align-items: center; gap: 10px; }
  .color-row label { font-size: 12px; width: 40px; }
  .color-row input[type="color"] {
    width: 32px; height: 24px; border: 2px solid #444; border-radius: 5px;
    cursor: pointer; background: none; padding: 1px;
  }
  .color-row .hex { font-size: 10px; opacity: 0.4; font-family: monospace; }

  /* 버튼 */
  .start-btn {
    width: 100%; padding: 11px; background: #27ae60; border: none; border-radius: 10px;
    color: white; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s;
  }
  .start-btn:hover { background: #2ecc71; }
  .start-btn:disabled { background: #555; cursor: not-allowed; }

  /* 말풍선 커스터마이징 */
  .bubble-section {
    width: 100%;
    border-top: 1px solid #333;
    padding-top: 12px;
  }
  .bubble-section-title {
    font-size: 13px; font-weight: 700; margin-bottom: 8px;
  }
  .bubble-tabs {
    display: flex; gap: 4px; margin-bottom: 8px;
  }
  .bubble-tab {
    flex: 1; padding: 6px 0; border: 2px solid #333; border-radius: 8px;
    background: #16213e; color: #aaa; font-size: 11px; cursor: pointer;
    text-align: center; transition: all 0.2s;
  }
  .bubble-tab:hover { border-color: #3498db; color: #ecf0f1; }
  .bubble-tab.active { border-color: #3498db; background: #1a3a6e; color: white; }
  .bubble-list {
    display: flex; flex-direction: column; gap: 4px;
    max-height: 150px; overflow-y: auto; margin-bottom: 6px;
    padding-right: 4px;
  }
  .bubble-list::-webkit-scrollbar { width: 4px; }
  .bubble-list::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
  .bubble-item {
    display: flex; align-items: center; gap: 4px;
  }
  .bubble-item input {
    flex: 1; background: #16213e; border: 1px solid #0f3460; border-radius: 6px;
    padding: 5px 8px; color: #ecf0f1; font-size: 12px; outline: none;
  }
  .bubble-item input:focus { border-color: #3498db; }
  .bubble-del-btn {
    width: 24px; height: 24px; border: none; border-radius: 6px;
    background: #c0392b; color: white; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.2s;
  }
  .bubble-del-btn:hover { background: #e74c3c; }
  .bubble-actions {
    display: flex; gap: 6px;
  }
  .bubble-add-btn, .bubble-reset-btn {
    padding: 5px 10px; border: none; border-radius: 6px;
    font-size: 11px; cursor: pointer; transition: background 0.2s;
  }
  .bubble-add-btn { background: #2980b9; color: white; }
  .bubble-add-btn:hover { background: #3498db; }
  .bubble-reset-btn { background: #7f8c8d; color: white; }
  .bubble-reset-btn:hover { background: #95a5a6; }
</style>
</head>
<body>

<div class="titlebar">캐릭터 만들기</div>

<div class="content">
  <h1>내 캐릭터 만들기</h1>
  <p class="subtitle">캐릭터를 선택하고 꾸며주세요</p>

  <div class="editor">
    <div class="preview">
      <div class="preview-box">
        <div class="preview-ground"></div>
        <canvas id="previewCanvas" width="128" height="192"></canvas>
      </div>
      <div class="preview-name" id="previewName">닉네임</div>
    </div>

    <div class="settings">
      <div class="field-group">
        <label>캐릭터</label>
        <div class="gender-selector">
          <button class="gender-btn active" id="btnBoy" data-gender="boy">👦 남자</button>
          <button class="gender-btn" id="btnGirl" data-gender="girl">👧 여자</button>
          <button class="gender-btn" id="btnPikachu" data-gender="pikachu">⚡ 피카츄</button>
          <button class="gender-btn" id="btnPsyduck" data-gender="psyduck">🦆 고라파덕</button>
          <button class="gender-btn" id="btnCat" data-gender="cat">🐱 고양이</button>
          <button class="gender-btn" id="btnSprigatito" data-gender="sprigatito">🌱 나오하</button>
          <button class="gender-btn" id="btnSlime" data-gender="slime">🟢 슬라임</button>
          <button class="gender-btn" id="btnCat2" data-gender="cat2">🐈 고양이2</button>
          <button class="gender-btn" id="btnRabbit" data-gender="rabbit">🐰 토끼</button>
          <button class="gender-btn" id="btnNezuco" data-gender="nezuco">🎋 네즈코</button>
          <button class="gender-btn" id="btnCalcifer" data-gender="calcifer">🔥 캘시퍼</button>
          <button class="gender-btn" id="btnPantom" data-gender="pantom">👻 팬텀</button>
          <button class="gender-btn" id="btnCat3" data-gender="cat3">🐾 고양이3</button>
          <button class="gender-btn" id="btnDuck" data-gender="duck">🦆 오리</button>
          <button class="gender-btn" id="btnMan" data-gender="man">🧔 남자2</button>
          <button class="gender-btn" id="btnGirl2" data-gender="girl2">💜 여자2</button>
          <button class="gender-btn" id="btnKnight" data-gender="knight">⚔️ 기사</button>
          <button class="gender-btn" id="btnRobot" data-gender="robot">🤖 로봇</button>
          <button class="gender-btn" id="btnVampier" data-gender="vampier">🧛 뱀파이어</button>
          <button class="gender-btn" id="btnMan2" data-gender="man2">🧑 남자3</button>
          <button class="gender-btn" id="btnNinja" data-gender="ninja">🥷 닌자</button>
          <button class="gender-btn" id="btnMan3" data-gender="man3">👨 남자4</button>
          <button class="gender-btn" id="btnLirakkuma" data-gender="lirakkuma">🧸 리라쿠마</button>
          <button class="gender-btn" id="btnBear" data-gender="bear">🐻 곰</button>
          <button class="gender-btn" id="btnFox" data-gender="fox">🦊 여우</button>
          <button class="gender-btn" id="btnKuromi" data-gender="kuromi">🖤 쿠로미</button>
          <button class="gender-btn" id="btnBoy2" data-gender="boy2">🧒 남자5</button>
          <button class="gender-btn" id="btnRabbit2" data-gender="rabbit2">🐇 토끼2</button>
          <button class="gender-btn" id="btnRacoon" data-gender="racoon">🦝 라쿤</button>
          <button class="gender-btn" id="btnOwl" data-gender="owl">🦉 부엉이</button>
          <button class="gender-btn" id="btnLizard" data-gender="lizard">🦎 도마뱀</button>
          <button class="gender-btn" id="btnPicnic" data-gender="picnic">🧺 피크닉</button>
          <button class="gender-btn" id="btnPikachu2" data-gender="pikachu2">⚡ 피카츄2</button>
          <button class="gender-btn" id="btnMole" data-gender="mole">🐾 두더지</button>
          <button class="gender-btn" id="btnSkeleton" data-gender="skeleton">💀 스켈레톤</button>
          <button class="gender-btn" id="btnFox2" data-gender="fox2">🦊 여우2</button>
          <button class="gender-btn" id="btnBear2" data-gender="bear2">🐻 곰2</button>
        </div>
      </div>

      <div class="field-group">
        <label>닉네임</label>
        <input type="text" class="nickname-input" id="nickname" placeholder="닉네임을 입력하세요" maxlength="12" />
        <div class="error-msg" id="errorMsg"></div>
      </div>

      <div class="field-group">
        <label>실명 <span style="font-weight:400;opacity:0.5;">(점심 투표 결과에만 사용)</span></label>
        <input type="text" class="nickname-input" id="realName" placeholder="실명을 입력하세요" maxlength="10" />
        <div class="error-msg" id="errorMsgReal"></div>
      </div>

      <div class="color-rows">
        <div class="color-row">
          <label>피부</label>
          <input type="color" id="colorSkin" value="#fee7d5">
          <span class="hex" id="hexSkin">#fee7d5</span>
        </div>
        <div class="color-row">
          <label>머리</label>
          <input type="color" id="colorHair" value="#bb7750">
          <span class="hex" id="hexHair">#bb7750</span>
        </div>
        <div class="color-row">
          <label>상의</label>
          <input type="color" id="colorTop" value="#df2210">
          <span class="hex" id="hexTop">#df2210</span>
        </div>
        <div class="color-row">
          <label>바지</label>
          <input type="color" id="colorPants" value="#10a4df">
          <span class="hex" id="hexPants">#10a4df</span>
        </div>
        <div class="color-row">
          <label>신발</label>
          <input type="color" id="colorShoes" value="#762f08">
          <span class="hex" id="hexShoes">#762f08</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 말풍선 메시지 커스터마이징 -->
  <div class="bubble-section">
    <div class="bubble-section-title">말풍선 메시지</div>
    <div class="bubble-tabs">
      <button class="bubble-tab active" data-cat="idle">대기</button>
      <button class="bubble-tab" data-cat="walk">이동</button>
      <button class="bubble-tab" data-cat="drag">드래그</button>
      <button class="bubble-tab" data-cat="click">클릭</button>
    </div>
    <div class="bubble-list" id="bubbleList"></div>
    <div class="bubble-actions">
      <button class="bubble-add-btn" id="bubbleAddBtn">+ 추가</button>
      <button class="bubble-reset-btn" id="bubbleResetBtn">기본값 초기화</button>
    </div>
  </div>

  <div style="display:flex;gap:8px;width:100%;margin-top:auto;">
    <button class="start-btn" id="startBtn" disabled style="flex:1;margin-top:0;">시작하기</button>
    <button class="start-btn" id="quitBtn" style="flex:0 0 80px;margin-top:0;background:#555;font-size:13px;">종료</button>
  </div>
</div>

<script>
  const canvas = document.getElementById('previewCanvas');
  const ctx = canvas.getContext('2d');
  const nicknameInput = document.getElementById('nickname');
  const realNameInput = document.getElementById('realName');
  const previewName = document.getElementById('previewName');
  const errorMsg = document.getElementById('errorMsg');
  const errorMsgReal = document.getElementById('errorMsgReal');
  const startBtn = document.getElementById('startBtn');

  const ORIG = { skin: '#fee7d5', hair: '#bb7750', top: '#df2210', pants: '#10a4df', shoes: '#762f08' };
  let colors = { ...ORIG };
  let gender = 'boy';

  const COLOR_INPUTS = {
    skin:  { input: document.getElementById('colorSkin'),  hex: document.getElementById('hexSkin') },
    hair:  { input: document.getElementById('colorHair'),  hex: document.getElementById('hexHair') },
    top:   { input: document.getElementById('colorTop'),   hex: document.getElementById('hexTop') },
    pants: { input: document.getElementById('colorPants'), hex: document.getElementById('hexPants') },
    shoes: { input: document.getElementById('colorShoes'), hex: document.getElementById('hexShoes') },
  };

  // 말풍선 기본 메시지
  const DEFAULT_BUBBLE = {
    idle: [
      '집중 중...', '열심히 하는 중~', '거의 다 됐다!', '으음...',
      '커피 마시고 싶다☕', '오늘 할 일이 많네', '슬슬 배고프다',
      '회의 몇 시지?', '점심 뭐 먹지', '퇴근하고 싶다...',
      '집중집중!', '한 잔 더...', '메일 확인해야지', '아 맞다!',
      '오늘 날씨 좋다', '주말이 빨리 왔으면', '화이팅!',
      '졸리다...', '간식 먹고 싶다', '오늘도 수고했어',
    ],
    walk: ['잠깐 스트레칭~', '화장실 다녀올게', '물 좀 마시자', '기지개~'],
    drag: ['으악!', '놔줘!', '높다!', '일하고 있었는데!'],
    click: ['안녕!', '헤헤~', '뭐야?', '놀아줘!', '반가워!'],
  };
  let bubbleMessages = JSON.parse(JSON.stringify(DEFAULT_BUBBLE));
  let currentBubbleCat = 'idle';

  // 말풍선 UI 렌더링
  function renderBubbleList() {
    const list = document.getElementById('bubbleList');
    list.innerHTML = '';
    const msgs = bubbleMessages[currentBubbleCat];
    msgs.forEach((msg, i) => {
      const item = document.createElement('div');
      item.className = 'bubble-item';
      const input = document.createElement('input');
      input.type = 'text';
      input.value = msg;
      input.maxLength = 30;
      input.addEventListener('input', (e) => {
        bubbleMessages[currentBubbleCat][i] = e.target.value;
      });
      const del = document.createElement('button');
      del.className = 'bubble-del-btn';
      del.textContent = '×';
      del.addEventListener('click', () => {
        bubbleMessages[currentBubbleCat].splice(i, 1);
        renderBubbleList();
      });
      item.appendChild(input);
      item.appendChild(del);
      list.appendChild(item);
    });
    // 리스트 맨 아래로 스크롤
    list.scrollTop = list.scrollHeight;
  }

  // 말풍선 탭 전환
  document.querySelectorAll('.bubble-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.bubble-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentBubbleCat = tab.dataset.cat;
      renderBubbleList();
    });
  });

  // 메시지 추가
  document.getElementById('bubbleAddBtn').addEventListener('click', () => {
    bubbleMessages[currentBubbleCat].push('');
    renderBubbleList();
    // 새로 추가된 input에 포커스
    const inputs = document.querySelectorAll('#bubbleList input');
    if (inputs.length) inputs[inputs.length - 1].focus();
  });

  // 기본값 초기화
  document.getElementById('bubbleResetBtn').addEventListener('click', () => {
    bubbleMessages[currentBubbleCat] = [...DEFAULT_BUBBLE[currentBubbleCat]];
    renderBubbleList();
  });

  let originalSVG = '';
  let spriteImg = null;
  const FRAME_W = 64, FRAME_H = 96;
  let frameIndex = 0;
  const IDLE_FRAME = { 0: 0, 1: 0, 2: 0, 3: 1 };

  // SVG 로드 (성별에 따라)
  async function loadSVG() {
    originalSVG = await window.electronAPI.readSVG(gender);
    updateSprite();
  }

  async function init() {
    // 기존 프로필 로드
    const profile = await window.electronAPI.loadProfile();
    if (profile) {
      if (profile.nickname) {
        nicknameInput.value = profile.nickname;
        previewName.textContent = profile.nickname;
      }
      if (profile.realName) {
        realNameInput.value = profile.realName;
      }
      validateForm();
      if (profile.gender) {
        gender = profile.gender;
        document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`[data-gender="${gender}"]`).classList.add('active');
      }
      if (profile.colors) {
        colors = { ...profile.colors };
        for (const [key, cfg] of Object.entries(COLOR_INPUTS)) {
          cfg.input.value = colors[key];
          cfg.hex.textContent = colors[key];
        }
      }
      if (profile.bubbleMessages) {
        for (const cat of Object.keys(DEFAULT_BUBBLE)) {
          if (Array.isArray(profile.bubbleMessages[cat])) {
            bubbleMessages[cat] = [...profile.bubbleMessages[cat]];
          }
        }
      }
    }
    renderBubbleList();
    await loadSVG();
  }

  function updateSprite() {
    const isPikachu = gender === 'pikachu';
    const isPsyduck = gender === 'psyduck';
    const isCat = gender === 'cat';
    const isSprigatito = gender === 'sprigatito';
    const isSlime = gender === 'slime';
    const isCat2 = gender === 'cat2';
    const isRabbit = gender === 'rabbit';
    const isNezuco = gender === 'nezuco';
    const isCalcifer = gender === 'calcifer';
    const isPantom = gender === 'pantom';
    const isCat3 = gender === 'cat3';
    const isDuck = gender === 'duck';
    const isKnight = gender === 'knight';
    const isRobot = gender === 'robot';
    const isVampier = gender === 'vampier';
    const isMan2 = gender === 'man2';
    const isNinja = gender === 'ninja';
    const isMan3 = gender === 'man3';
    const isLirakkuma = gender === 'lirakkuma';
    const isBear = gender === 'bear';
    const isFox = gender === 'fox';
    const isKuromi = gender === 'kuromi';
    const isBoy2 = gender === 'boy2';
    const isOwl = gender === 'owl';
    const isLizard = gender === 'lizard';
    const isPicnic = gender === 'picnic';
    const isPikachu2 = gender === 'pikachu2';
    const isMole = gender === 'mole';
    const isSkeleton = gender === 'skeleton';
    const isFox2 = gender === 'fox2';
    const isBear2 = gender === 'bear2';
    const isPokemon = isPikachu || isPsyduck || isCat || isSprigatito || isSlime || isCat2 || isRabbit || isNezuco || isCalcifer || isPantom || isCat3 || isDuck || isKnight || isRobot || isVampier || isMan2 || isNinja || isMan3 || isLirakkuma || isBear || isFox || isKuromi || isBoy2 || isOwl || isLizard || isPicnic || isPikachu2 || isMole || isSkeleton || isFox2 || isBear2;
    const isPng = originalSVG.startsWith('data:image/png');
    let svg = originalSVG;
    // 포켓몬/PNG는 색상 커스터마이징 스킵
    if (!isPokemon && !isPng) {
      for (const key of Object.keys(ORIG)) {
        if (colors[key] !== ORIG[key])
          svg = svg.replaceAll('fill="' + ORIG[key] + '"', 'fill="' + colors[key] + '"');
      }
    }
    let url;
    if (isPng) {
      url = svg;
    } else {
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      url = URL.createObjectURL(blob);
    }
    const img = new Image();
    img.onload = () => {
      const w = img.width, h = img.height;
      const fw = w / 4, fh = h / 4;
      if (isPikachu) {
        // 피카츄 스프라이트 교정 (row 2 col 1,2,3 ↔ row 3 col 0,1,2)
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        const cx = cv.getContext('2d');
        cx.imageSmoothingEnabled = false;
        cx.drawImage(img, 0, 0);
        const tmp = document.createElement('canvas');

        cx.clearRect(3*fw, 0, fw, fh);
        cx.drawImage(frameCv, 0, 0, fw, fh, 3*fw, 0, fw, fh);
        const tmp = document.createElement('canvas');
        tmp.width = 4*fw; tmp.height = fh;
        const tx = tmp.getContext('2d');
        tx.imageSmoothingEnabled = false;
        tx.drawImage(cv, 0, 2*fh, 4*fw, fh, 0, 0, 4*fw, fh);
        cx.clearRect(0, 3*fh, 4*fw, fh);
        for (let c = 0; c < 4; c++) {
          cx.save();
          cx.translate((c+1)*fw, 3*fh);
          cx.scale(-1, 1);
          cx.drawImage(tmp, c*fw, 0, fw, fh, 0, 0, fw, fh);
          cx.restore();
        }
        const fixed = new Image();
        fixed.onload = () => { spriteImg = fixed; };
        fixed.src = cv.toDataURL();
      } else if (isBoy2) {
        // 남자5: 원본 row 3 col 2 좌우반전 → row 2 col 1, col 3 / row 3 (RIGHT) = 수정된 row 2 프레임별 좌우반전
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        const cx = cv.getContext('2d');
        cx.imageSmoothingEnabled = false;
        cx.drawImage(img, 0, 0);
        const flipped = document.createElement('canvas');
        flipped.width = fw; flipped.height = fh;
        const fc = flipped.getContext('2d');
        fc.imageSmoothingEnabled = false;
        fc.save(); fc.translate(fw, 0); fc.scale(-1, 1);
        fc.drawImage(cv, 2*fw, 3*fh, fw, fh, 0, 0, fw, fh);
        fc.restore();
        cx.clearRect(1*fw, 2*fh, fw, fh);
        cx.drawImage(flipped, 0, 0, fw, fh, 1*fw, 2*fh, fw, fh);
        cx.clearRect(3*fw, 2*fh, fw, fh);
        cx.drawImage(flipped, 0, 0, fw, fh, 3*fw, 2*fh, fw, fh);
        const tmp = document.createElement('canvas');
        tmp.width = 4*fw; tmp.height = fh;
        const tx = tmp.getContext('2d');
        tx.imageSmoothingEnabled = false;
        tx.drawImage(cv, 0, 2*fh, 4*fw, fh, 0, 0, 4*fw, fh);
        cx.clearRect(0, 3*fh, 4*fw, fh);
        for (let c = 0; c < 4; c++) {
          cx.save();
          cx.translate((c+1)*fw, 3*fh);
          cx.scale(-1, 1);
          cx.drawImage(tmp, c*fw, 0, fw, fh, 0, 0, fw, fh);
          cx.restore();
        }
        const fixed = new Image();
        fixed.onload = () => { spriteImg = fixed; };
        fixed.src = cv.toDataURL();
      } else if (isKuromi) {
        // 쿠로미: row 2 col 2 ← row 2 col 0 / row 2 col 3 ← row 2 col 1 / row 3 (RIGHT) = 수정된 row 2 프레임별 좌우반전
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        const cx = cv.getContext('2d');
        cx.imageSmoothingEnabled = false;
        cx.drawImage(img, 0, 0);
        cx.clearRect(2*fw, 2*fh, fw, fh);
        cx.drawImage(cv, 0, 2*fh, fw, fh, 2*fw, 2*fh, fw, fh);
        cx.clearRect(3*fw, 2*fh, fw, fh);
        cx.drawImage(cv, 1*fw, 2*fh, fw, fh, 3*fw, 2*fh, fw, fh);
        const tmp = document.createElement('canvas');
        tmp.width = 4*fw; tmp.height = fh;
        const tx = tmp.getContext('2d');
        tx.imageSmoothingEnabled = false;
        tx.drawImage(cv, 0, 2*fh, 4*fw, fh, 0, 0, 4*fw, fh);
        cx.clearRect(0, 3*fh, 4*fw, fh);
        for (let c = 0; c < 4; c++) {
          cx.save();
          cx.translate((c+1)*fw, 3*fh);
          cx.scale(-1, 1);
          cx.drawImage(tmp, c*fw, 0, fw, fh, 0, 0, fw, fh);
          cx.restore();
        }
        const fixed = new Image();
        fixed.onload = () => { spriteImg = fixed; };
        fixed.src = cv.toDataURL();
      } else if (isFox) {
        // 여우: row 3 (RIGHT) col 0 ← row 3 col 2 / row 2 (LEFT) = 수정된 row 3 프레임별 좌우반전
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        const cx = cv.getContext('2d');
        cx.imageSmoothingEnabled = false;
        cx.drawImage(img, 0, 0);
        cx.clearRect(0, 3*fh, fw, fh);
        cx.drawImage(cv, 2*fw, 3*fh, fw, fh, 0, 3*fh, fw, fh);
        const tmp = document.createElement('canvas');
        tmp.width = 4*fw; tmp.height = fh;
        const tx = tmp.getContext('2d');
        tx.imageSmoothingEnabled = false;
        tx.drawImage(cv, 0, 3*fh, 4*fw, fh, 0, 0, 4*fw, fh);
        cx.clearRect(0, 2*fh, 4*fw, fh);
        for (let c = 0; c < 4; c++) {
          cx.save();
          cx.translate((c+1)*fw, 2*fh);
          cx.scale(-1, 1);
          cx.drawImage(tmp, c*fw, 0, fw, fh, 0, 0, fw, fh);
          cx.restore();
        }
        const fixed = new Image();
        fixed.onload = () => { spriteImg = fixed; };
        fixed.src = cv.toDataURL();
      } else if (isBear || isSkeleton) {
        // 곰/스켈레톤: row 2 col 3 ← row 2 col 1 / row 3 (RIGHT) = 수정된 row 2 프레임별 좌우반전
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        const cx = cv.getContext('2d');
        cx.imageSmoothingEnabled = false;
        cx.drawImage(img, 0, 0);
        cx.clearRect(3*fw, 2*fh, fw, fh);
        cx.drawImage(cv, 1*fw, 2*fh, fw, fh, 3*fw, 2*fh, fw, fh);
        const tmp = document.createElement('canvas');
        tmp.width = 4*fw; tmp.height = fh;
        const tx = tmp.getContext('2d');
        tx.imageSmoothingEnabled = false;
        tx.drawImage(cv, 0, 2*fh, 4*fw, fh, 0, 0, 4*fw, fh);
        cx.clearRect(0, 3*fh, 4*fw, fh);
        for (let c = 0; c < 4; c++) {
          cx.save();
          cx.translate((c+1)*fw, 3*fh);
          cx.scale(-1, 1);
          cx.drawImage(tmp, c*fw, 0, fw, fh, 0, 0, fw, fh);
          cx.restore();
        }
        const fixed = new Image();
        fixed.onload = () => { spriteImg = fixed; };
        fixed.src = cv.toDataURL();
      } else if (isLirakkuma) {
        // 리라쿠마: row 2 col 2 ← row 2 col 0 / row 3 (RIGHT) = 수정된 row 2 프레임별 좌우반전
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        const cx = cv.getContext('2d');
        cx.imageSmoothingEnabled = false;
        cx.drawImage(img, 0, 0);
        cx.clearRect(2*fw, 2*fh, fw, fh);
        cx.drawImage(cv, 0, 2*fh, fw, fh, 2*fw, 2*fh, fw, fh);
        const tmp = document.createElement('canvas');
        tmp.width = 4*fw; tmp.height = fh;
        const tx = tmp.getContext('2d');
        tx.imageSmoothingEnabled = false;
        tx.drawImage(cv, 0, 2*fh, 4*fw, fh, 0, 0, 4*fw, fh);
        cx.clearRect(0, 3*fh, 4*fw, fh);
        for (let c = 0; c < 4; c++) {
          cx.save();
          cx.translate((c+1)*fw, 3*fh);
          cx.scale(-1, 1);
          cx.drawImage(tmp, c*fw, 0, fw, fh, 0, 0, fw, fh);
          cx.restore();
        }
        const fixed = new Image();
        fixed.onload = () => { spriteImg = fixed; };
        fixed.src = cv.toDataURL();
      } else if (isVampier || isMan2 || isNinja || isMan3 || isMole || isBear2) {
        // 뱀파이어/남자3/닌자/남자4/두더지/곰2: row 3 (RIGHT) = row 2 (LEFT) 프레임별 좌우반전
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        const cx = cv.getContext('2d');
        cx.imageSmoothingEnabled = false;
        cx.drawImage(img, 0, 0);
        const tmp = document.createElement('canvas');
        tmp.width = 4*fw; tmp.height = fh;
        const tx = tmp.getContext('2d');
        tx.imageSmoothingEnabled = false;
        tx.drawImage(cv, 0, 2*fh, 4*fw, fh, 0, 0, 4*fw, fh);
        cx.clearRect(0, 3*fh, 4*fw, fh);
        for (let c = 0; c < 4; c++) {
          cx.save();
          cx.translate((c+1)*fw, 3*fh);
          cx.scale(-1, 1);
          cx.drawImage(tmp, c*fw, 0, fw, fh, 0, 0, fw, fh);
          cx.restore();
        }
        const fixed = new Image();
        fixed.onload = () => { spriteImg = fixed; };
        fixed.src = cv.toDataURL();
      } else if (isCat) {
        // 고양이 스프라이트 교정:
        // - row 2 원본(오른쪽 애니메이션) → row 3 (RIGHT) 그대로 복사
        // - row 2 (LEFT) 는 각 프레임을 개별적으로 좌우 반전 (순서 유지)
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        const cx = cv.getContext('2d');
        cx.imageSmoothingEnabled = false;
        cx.drawImage(img, 0, 0);
        // row 2 백업
        const tmp = document.createElement('canvas');
        tmp.width = 4*fw; tmp.height = fh;
        const tx = tmp.getContext('2d');
        tx.imageSmoothingEnabled = false;
        tx.drawImage(cv, 0, 2*fh, 4*fw, fh, 0, 0, 4*fw, fh);
        // row 3 (RIGHT) ← 백업
        cx.clearRect(0, 3*fh, 4*fw, fh);
        cx.drawImage(tmp, 0, 0, 4*fw, fh, 0, 3*fh, 4*fw, fh);
        // row 2 (LEFT) ← 각 프레임 개별 좌우 반전
        cx.clearRect(0, 2*fh, 4*fw, fh);
        for (let c = 0; c < 4; c++) {
          cx.save();
          cx.translate((c+1)*fw, 2*fh);
          cx.scale(-1, 1);
          cx.drawImage(tmp, c*fw, 0, fw, fh, 0, 0, fw, fh);
          cx.restore();
        }
        const fixed = new Image();
        fixed.onload = () => { spriteImg = fixed; };
        fixed.src = cv.toDataURL();
      } else {
        spriteImg = img;
      }
    };
    img.src = url;
    // 색상 입력 섹션 활성/비활성 토글 (포켓몬은 비활성)
    for (const [key, cfg] of Object.entries(COLOR_INPUTS)) {
      cfg.input.disabled = isPokemon;
      cfg.input.style.opacity = isPokemon ? '0.3' : '1';
    }
  }

  // 애니메이션
  setInterval(() => {
    if (!spriteImg) return;
    frameIndex = (frameIndex + 1) % 4;
    ctx.clearRect(0, 0, 128, 192);
    ctx.imageSmoothingEnabled = false;
    const rows = [0, 2, 1, 3];
    const animRow = rows[Math.floor(Date.now() / 2000) % 4];
    const sx = (frameIndex % 4) * FRAME_W;
    const sy = animRow * FRAME_H;
    ctx.drawImage(spriteImg, sx, sy, FRAME_W, FRAME_H, 0, 0, 128, 192);
  }, 200);

  // 성별 선택
  document.querySelectorAll('.gender-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      gender = btn.dataset.gender;
      loadSVG();
    });
  });

  // 색상 변경
  for (const [key, cfg] of Object.entries(COLOR_INPUTS)) {
    cfg.input.addEventListener('input', (e) => {
      colors[key] = e.target.value;
      cfg.hex.textContent = e.target.value;
      updateSprite();
    });
  }

  // 폼 검증 (닉네임 + 실명)
  function validateForm() {
    const nick = nicknameInput.value.trim();
    const real = realNameInput.value.trim();
    previewName.textContent = nick || '닉네임';

    let nickOk = true, realOk = true;
    if (nick.length === 0) { errorMsg.textContent = ''; nickOk = false; }
    else if (nick.length < 2) { errorMsg.textContent = '2글자 이상 입력해주세요'; nickOk = false; }
    else { errorMsg.textContent = ''; }

    if (real.length === 0) { errorMsgReal.textContent = ''; realOk = false; }
    else if (real.length < 2) { errorMsgReal.textContent = '2글자 이상 입력해주세요'; realOk = false; }
    else { errorMsgReal.textContent = ''; }

    startBtn.disabled = !(nickOk && realOk);
  }

  nicknameInput.addEventListener('input', validateForm);
  realNameInput.addEventListener('input', validateForm);

  // 시작
  startBtn.addEventListener('click', async () => {
    const nickname = nicknameInput.value.trim();
    const realName = realNameInput.value.trim();
    if (nickname.length < 2 || realName.length < 2) return;
    // 빈 문자열 메시지 제거
    const cleanBubble = {};
    for (const cat of Object.keys(bubbleMessages)) {
      cleanBubble[cat] = bubbleMessages[cat].filter(m => m.trim().length > 0);
    }
    const profile = { nickname, realName, gender, colors: { ...colors }, bubbleMessages: cleanBubble, createdAt: new Date().toISOString() };
    await window.electronAPI.saveProfile(profile);
    window.electronAPI.setupDone();
  });

  document.getElementById('quitBtn').addEventListener('click', () => window.electronAPI.quitApp());

  init();
</script>
</body>
</html>
