      const g = btn.dataset.g;
      const idx = modalFavorites.indexOf(g);
      if (idx >= 0) modalFavorites.splice(idx, 1);
      else modalFavorites.push(g);
      applyModalFavorites();
    });
    btn.appendChild(star);
  });
}
function applyModalFavorites() {
  document.querySelectorAll('.modal-gender').forEach(btn => {
    const g = btn.dataset.g;
    const isFav = modalFavorites.includes(g);
    btn.classList.toggle('favorited', isFav);
    btn.style.order = isFav ? '-1' : '0';
  });
}

function openProfileModal() {
  modalGender = myProfile.gender || 'boy';
  modalColors = { ...(myProfile.colors || {}) };
  document.getElementById('modalNickname').value = myProfile.nickname || '';
  document.getElementById('modalRealName').value = myProfile.realName || '';

  // 즐겨찾기 초기화
  initModalFavoriteStars();
  modalFavorites = Array.isArray(myProfile.favoriteGenders) ? [...myProfile.favoriteGenders] : [];
  applyModalFavorites();

  // 말풍선 메시지 초기화
  modalBubbleMessages = JSON.parse(JSON.stringify(DEFAULT_BUBBLE_MSGS));
  if (myProfile.bubbleMessages) {
    for (const cat of Object.keys(DEFAULT_BUBBLE_MSGS)) {
      if (Array.isArray(myProfile.bubbleMessages[cat])) {
        modalBubbleMessages[cat] = [...myProfile.bubbleMessages[cat]];
      }
    }
  }
  modalBubbleCat = 'idle';
  document.querySelectorAll('.modal-bubble-tab').forEach(t => {
    t.style.borderColor = '#333'; t.style.background = '#16213e'; t.style.color = '#aaa';
  });
  document.querySelector('.modal-bubble-tab[data-cat="idle"]').style.borderColor = '#3498db';
  document.querySelector('.modal-bubble-tab[data-cat="idle"]').style.background = '#1a3a6e';
  document.querySelector('.modal-bubble-tab[data-cat="idle"]').style.color = 'white';
  renderModalBubbleList();

  // 성별 버튼
  document.querySelectorAll('.modal-gender').forEach(b => {
    b.classList.remove('active');
    b.style.borderColor = '#333'; b.style.background = '#16213e'; b.style.color = '#aaa';
    if (b.dataset.g === modalGender) {
      b.classList.add('active');
      b.style.borderColor = '#3498db'; b.style.background = '#1a3a6e'; b.style.color = 'white';
    }
  });

  // 색상 입력
  document.querySelectorAll('.modal-color input').forEach(inp => {
    inp.value = modalColors[inp.dataset.key] || ORIG_COLORS[inp.dataset.key];
  });

  modal.style.display = 'flex';
  updateModalSprite();
}

async function updateModalSprite() {
  const svg = svgByGender[modalGender] || originalSVG;
  modalSpriteImg = await createSpriteImage(svg, modalColors, { isPikachu: modalGender === 'pikachu', isPsyduck: modalGender === 'psyduck', isCat: modalGender === 'cat', isSprigatito: modalGender === 'sprigatito', isSlime: modalGender === 'slime', isCat2: modalGender === 'cat2', isRabbit: modalGender === 'rabbit', isNezuco: modalGender === 'nezuco', isCalcifer: modalGender === 'calcifer', isPantom: modalGender === 'pantom', isCat3: modalGender === 'cat3', isDuck: modalGender === 'duck', isKnight: modalGender === 'knight', isRobot: modalGender === 'robot', isVampier: modalGender === 'vampier', isMan2: modalGender === 'man2', isNinja: modalGender === 'ninja', isMan3: modalGender === 'man3', isLirakkuma: modalGender === 'lirakkuma', isBear: modalGender === 'bear', isFox: modalGender === 'fox', isKuromi: modalGender === 'kuromi', isBoy2: modalGender === 'boy2', isOwl: modalGender === 'owl', isLizard: modalGender === 'lizard', isPicnic: modalGender === 'picnic', isPikachu2: modalGender === 'pikachu2', isMole: modalGender === 'mole', isSkeleton: modalGender === 'skeleton', isFox2: modalGender === 'fox2', isBear2: modalGender === 'bear2', isPikachu3: modalGender === 'pikachu3' });
  // 색상 커스터마이징 없는 캐릭터는 색상 섹션 비활성화
  const colorSection = document.querySelectorAll('.modal-color');
  const isModalPokemon = ['pikachu','psyduck','cat','sprigatito','slime','cat2','rabbit','nezuco','calcifer','pantom','cat3','duck','knight','robot','vampier','man2','ninja','man3','lirakkuma','bear','fox','kuromi','boy2','owl','lizard','picnic','pikachu2','mole','skeleton','fox2','bear2','pikachu3'].includes(modalGender);
  colorSection.forEach(el => { el.style.opacity = isModalPokemon ? '0.3' : '1'; });
  document.querySelectorAll('.modal-color input').forEach(inp => { inp.disabled = (modalGender === 'pikachu'); });
}

// 모달 애니메이션
setInterval(() => {
  if (!modalSpriteImg || modal.style.display === 'none') return;
  const fi = Math.floor(Date.now() / 200) % 4;
  const rows = [0, 2, 1, 3];
  const row = rows[Math.floor(Date.now() / 2000) % 4];
  modalCtx.clearRect(0, 0, 128, 192);
  modalCtx.imageSmoothingEnabled = false;
  modalCtx.drawImage(modalSpriteImg, fi * FRAME_W, row * FRAME_H, FRAME_W, FRAME_H, 0, 0, 128, 192);
}, 200);

// 성별 선택
document.querySelectorAll('.modal-gender').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.modal-gender').forEach(b => {
      b.style.borderColor = '#333'; b.style.background = '#16213e'; b.style.color = '#aaa';
    });
    btn.style.borderColor = '#3498db'; btn.style.background = '#1a3a6e'; btn.style.color = 'white';
    modalGender = btn.dataset.g;
    updateModalSprite();
  });
});

// 색상 변경
document.querySelectorAll('.modal-color input').forEach(inp => {
  inp.addEventListener('input', () => {
    modalColors[inp.dataset.key] = inp.value;
    updateModalSprite();
  });
});

// 저장
document.getElementById('modalSave').addEventListener('click', async () => {
  const nickname = document.getElementById('modalNickname').value.trim();
  const realName = document.getElementById('modalRealName').value.trim();
  if (nickname.length < 2 || realName.length < 2) return;

  myProfile.nickname = nickname;
  myProfile.realName = realName;
  myProfile.gender = modalGender;
  myProfile.colors = { ...modalColors };
  // 빈 문자열 메시지 제거 후 저장
  const cleanBubble = {};
  for (const cat of Object.keys(modalBubbleMessages)) {
    cleanBubble[cat] = modalBubbleMessages[cat].filter(m => m.trim().length > 0);
  }
  myProfile.bubbleMessages = cleanBubble;
  myProfile.favoriteGenders = [...modalFavorites];
  await window.electronAPI.saveProfile(myProfile);

  // 내 스프라이트 갱신
  originalSVG = svgByGender[modalGender];
  mySpriteImg = await createSpriteImage(originalSVG, myProfile.colors, { isPikachu: modalGender === 'pikachu', isPsyduck: modalGender === 'psyduck', isCat: modalGender === 'cat', isSprigatito: modalGender === 'sprigatito', isSlime: modalGender === 'slime', isCat2: modalGender === 'cat2', isRabbit: modalGender === 'rabbit', isNezuco: modalGender === 'nezuco', isCalcifer: modalGender === 'calcifer', isPantom: modalGender === 'pantom', isCat3: modalGender === 'cat3', isDuck: modalGender === 'duck', isKnight: modalGender === 'knight', isRobot: modalGender === 'robot', isVampier: modalGender === 'vampier', isMan2: modalGender === 'man2', isNinja: modalGender === 'ninja', isMan3: modalGender === 'man3', isLirakkuma: modalGender === 'lirakkuma', isBear: modalGender === 'bear', isFox: modalGender === 'fox', isKuromi: modalGender === 'kuromi', isBoy2: modalGender === 'boy2', isOwl: modalGender === 'owl', isLizard: modalGender === 'lizard', isPicnic: modalGender === 'picnic', isPikachu2: modalGender === 'pikachu2', isMole: modalGender === 'mole', isSkeleton: modalGender === 'skeleton', isFox2: modalGender === 'fox2', isBear2: modalGender === 'bear2', isPikachu3: modalGender === 'pikachu3' });

  // 서버에 다시 알림
  if (socketConnected) {
    window.electronAPI.socketEmit('join', {
      nickname: myProfile.nickname, realName: myProfile.realName,
      colors: myProfile.colors, gender: myProfile.gender,
      x: myX, y: myY, mode: 'rest',
    });
  }

  modal.style.display = 'none';
});

// 취소
document.getElementById('modalCancel').addEventListener('click', () => {
  modal.style.display = 'none';
});
</script>
